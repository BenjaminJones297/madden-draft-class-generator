version: "3.9"

# Madden Franchise Manager — Docker Compose (on-prem / local dev)
#
# Start everything:
#   docker compose up --build
#
# Required env vars (set in .env):
#   DB_PASS       — PostgreSQL password
#   OLLAMA_HOST   — Ollama endpoint (default: http://host.docker.internal:11434)
#
# Optional:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY
#
# Ollama note: Run Ollama natively on the host (not in Docker) for full GPU
#   access. The host.docker.internal hostname lets containers reach it.

services:

  # ── Reverse proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Python FastAPI backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://madden:${DB_PASS:-madden}@postgres:5432/madden
      - REDIS_URL=redis://redis:6379
      - NODE_SIDECAR_URL=http://node-sidecar:3001
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_PATH=/data/files
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - file-store:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      node-sidecar:
        condition: service_started
    restart: unless-stopped

  # ── ARQ background worker (same image as backend) ─────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python -m arq backend.workers.job_runner.WorkerSettings
    environment:
      - DATABASE_URL=postgresql+asyncpg://madden:${DB_PASS:-madden}@postgres:5432/madden
      - REDIS_URL=redis://redis:6379
      - NODE_SIDECAR_URL=http://node-sidecar:3001
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:8b}
      - STORAGE_BACKEND=local
      - STORAGE_LOCAL_PATH=/data/files
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - file-store:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      node-sidecar:
        condition: service_started
    restart: unless-stopped

  # ── Node.js sidecar (Madden file I/O) ────────────────────────────────────────
  node-sidecar:
    build:
      context: node-sidecar
      dockerfile: Dockerfile
    expose:
      - "3001"
    volumes:
      - file-store:/data/files
    restart: unless-stopped

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=madden
      - POSTGRES_USER=madden
      - POSTGRES_PASSWORD=${DB_PASS:-madden}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U madden -d madden"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  file-store:
