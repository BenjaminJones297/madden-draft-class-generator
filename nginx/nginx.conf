# nginx/nginx.conf
#
# Reverse proxy for Madden Franchise Manager
#   - Proxies /api and /ws to the Python FastAPI backend
#   - Serves static files from /usr/share/nginx/html (future: Next.js frontend)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 512M;  # Allow large .ros / .draftclass uploads

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;  # LLM calls can take a long time
        }

        # ── WebSocket proxy ───────────────────────────────────────────────────
        location /ws/ {
            proxy_pass             http://backend;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host $host;
            proxy_read_timeout     3600s;  # Keep WS alive during long jobs
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
        }

        # ── Future: static Next.js frontend ───────────────────────────────────
        # location / {
        #     root   /usr/share/nginx/html;
        #     index  index.html;
        #     try_files $uri $uri/ /index.html;
        # }
    }
}
